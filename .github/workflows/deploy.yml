name: 🚀 自动构建并部署 Doks 文档

on:
  push:
    branches:
      - main  # 如果您的主分支名是 master，请改为 master

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 检出代码
        uses: actions/checkout@v4
        with:
          submodules: recursive  # 如果 Doks 是作为 submodule 引入的，这行非常重要
          fetch-depth: 0         # 获取完整历史以支持 .Lastmod 等功能

      - name: 🛠️ 安装 Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: 'latest'
          extended: true        # Doks 通常需要 Extended 版本来处理 SCSS

      - name: 📦 安装 Node.js 依赖
        # Doks 依赖 NPM 来处理样式和搜索索引
        run: npm install

      - name: 🏗️ 执行构建
        run: npm run build      # Doks 默认使用 npm 脚本调用 hugo

      - name: 🌐 部署到 GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public  # 构建后的静态文件存放目录